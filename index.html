<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nibble Notes PWA</title>
  <meta name="description" content="Simple note-taking app – note before you forget"/>

  <!-- PWA required meta tags -->
  <meta name="theme-color" content="#6f42c1"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/icon-192.png"/>

  <!-- iOS support -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>Nibble Notes</h1>
    <p>Note before you forget.</p>
  </header>

  <main>
    <input type="text" id="noteInput" placeholder="Quick nibble..." autofocus/>
    <button onclick="addNote()">Add</button>
    <ul id="notesList"></ul>
  </main>

  <div id="installPrompt" style="display:none; position:fixed; bottom:16px; left:16px; right:16px; background:#6f42c1; color:white; padding:16px; border-radius:12px; text-align:center;">
    Install Nibble Notes? 
    <button onclick="installPWA()">Install</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
